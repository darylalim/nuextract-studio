# Streamlit theme — professional GitHub-inspired palette.
# All keys validated against Streamlit 1.58.0's theme schema.
# Defining both [theme.light] and [theme.dark] keeps the app readable in
# either mode instead of locking it to one.

[theme]
baseRadius = "8px"
buttonRadius = "8px"
linkUnderline = false
showWidgetBorder = true
codeFont = "monospace"

[theme.light]
primaryColor = "#0969da"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f6f8fa"
textColor = "#1f2328"
linkColor = "#0969da"
codeBackgroundColor = "#f6f8fa"
borderColor = "#d0d7de"
greenColor = "#1a7f37"
redColor = "#cf222e"
orangeColor = "#bf8700"

[theme.dark]
primaryColor = "#2f81f7"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
linkColor = "#2f81f7"
codeBackgroundColor = "#161b22"
borderColor = "#30363d"
greenColor = "#3fb950"
redColor = "#f85149"
orangeColor = "#d29922"
