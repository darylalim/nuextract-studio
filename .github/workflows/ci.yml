name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # macos-14 provides Apple Silicon runners; MLX requires arm64 macOS.
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

      - name: Run tests
        run: uv run pytest -v
        # All tests are mocked — none load the real model — so the suite runs
        # fast on CI. The model-loading smoke check is the manual probe:
        # `uv run python scripts/probe_mlx_vlm.py` (not run in CI).
